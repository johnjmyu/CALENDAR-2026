
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calendar 2026</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
  body {
    background: url('https://www.transparenttextures.com/patterns/red-china.png');
    background-color: #8b0000;
    color: #333;
  }

  .calendar-container {
    max-width: 900px;
    margin: auto;
    background: #fff8e7;
    border: 5px solid #c9a227;
    border-radius: 10px;
    padding: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  th, td {
    border: 1px solid #000;
    height: 100px;
    vertical-align: top;
    padding: 5px;
    position: relative;

    /* ✨ animation base */
    transition: all 0.25s ease;
  }

  th {
    background: #c9a227;
    color: white;
  }

  td {
    background: #fff;
    cursor: pointer;
  }

  /* 🔥 HOVER EFFECT */
  td:hover {
    transform: scale(1.08) translateY(-5px);
    z-index: 2;
    background: #fff3cd;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    border-color: #c9a227;
  }

  /* ✨ Glow effect */
  td:hover::after {
    content: "";
    position: absolute;
    inset: 0;
    border: 2px solid gold;
    border-radius: 5px;
    pointer-events: none;
    animation: glow 1s infinite alternate;
  }

  @keyframes glow {
    from { opacity: 0.4; }
    to { opacity: 1; }
  }

  .today {
    background-color: #ffeb3b !important;
  }

  .holiday {
    background-color: #ffcccc !important;
  }

  .badge {
    font-size: 10px;
  }

  h2 {
    color: #fff;
    text-align: center;
    margin-bottom: 20px;
  }

  .nav-btn {
    background: #c9a227;
    color: white;
    border: none;
    padding: 5px 10px;
    border-radius: 5px;
    transition: 0.2s;
  }

  .nav-btn:hover {
    background: #a8891c;
    transform: scale(1.1);
  }
</style>
</head>
<body>

<h2>📅 Calendar 2026</h2>

<div class="calendar-container">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <button class="nav-btn" onclick="prevMonth()">←</button>
    <h4 id="monthYear"></h4>
    <button class="nav-btn" onclick="nextMonth()">→</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Sun</th>
        <th>Mon</th>
        <th>Tue</th>
        <th>Wed</th>
        <th>Thu</th>
        <th>Fri</th>
        <th>Sat</th>
      </tr>
    </thead>
    <tbody id="calendarBody"></tbody>
  </table>
</div>

<script>
  const holidays2026 = {
    "2026-01-01": "New Year's Day",
    "2026-04-02": "Holy Week",
    "2026-04-03": "Holy Week",
    "2026-06-12": "Independence Day",
    "2026-12-25": "Christmas Day"
  };

  let currentDate = new Date(2026, 0);

  function renderCalendar() {
    const body = document.getElementById("calendarBody");
    const monthYear = document.getElementById("monthYear");

    body.innerHTML = "";

    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();

    const firstDay = new Date(year, month, 1).getDay();
    const totalDays = new Date(year, month + 1, 0).getDate();

    const monthNames = [
      "January","February","March","April","May","June",
      "July","August","September","October","November","December"
    ];

    monthYear.innerText = `${monthNames[month]} ${year}`;

    let row = document.createElement("tr");

    // Empty cells
    for (let i = 0; i < firstDay; i++) {
      row.appendChild(document.createElement("td"));
    }

    const today = new Date();

    for (let day = 1; day <= totalDays; day++) {
      if (row.children.length === 7) {
        body.appendChild(row);
        row = document.createElement("tr");
      }

      let cell = document.createElement("td");

      let fullDate = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

      if (
        day === today.getDate() &&
        month === today.getMonth() &&
        year === today.getFullYear()
      ) {
        cell.classList.add("today");
      }

      if (holidays2026[fullDate]) {
        cell.classList.add("holiday");
      }

      cell.innerHTML = `<strong>${day}</strong>`;

      if (holidays2026[fullDate]) {
        cell.innerHTML += `<br><span class="badge bg-danger">${holidays2026[fullDate]}</span>`;
      }

      row.appendChild(cell);
    }

    body.appendChild(row);
  }

  function prevMonth() {
    currentDate.setMonth(currentDate.getMonth() - 1);
    renderCalendar();
  }

  function nextMonth() {
    currentDate.setMonth(currentDate.getMonth() + 1);
    renderCalendar();
  }

  renderCalendar();
</script>

</body>
</html>
